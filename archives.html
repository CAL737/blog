<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives | CAL737_BLOG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-title { font-size: 1.5rem; color: var(--neon-blue); margin: 40px 0; display: flex; align-items: center; gap: 10px; }
        .page-title::before { content: ">"; color: var(--neon-purple); }
        .page-title::after { content: ""; display: inline-block; width: 10px; height: 18px; background: var(--neon-blue); animation: blink 1s step-end infinite; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple), transparent); }
        .log-item { position: relative; margin-bottom: 35px; padding: 20px; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); transition: all 0.3s; }
        .log-item:hover { border-color: rgba(0, 243, 255, 0.3); background: rgba(0, 243, 255, 0.03); transform: translateX(5px); }
        .log-item::before { content: ""; position: absolute; left: -36px; top: 24px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .log-date { font-size: 0.8rem; color: var(--neon-purple); margin-bottom: 8px; letter-spacing: 1px; }
        .log-title a { font-size: 1.2rem; color: #fff; text-decoration: none; transition: color 0.3s; }
        .log-title a:hover { color: var(--neon-blue); text-shadow: 0 0 8px rgba(0,243,255,0.4); }
        .log-tag { display: inline-block; margin-top: 10px; font-size: 0.75rem; padding: 2px 8px; border: 1px solid rgba(188, 19, 254, 0.4); border-radius: 4px; color: var(--neon-purple); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <nav>
            <a href="/">[ Home ]</a>
            <a href="/archives.html">[ Archives ]</a>
            <a href="/about.html">[ About ]</a>
            <a href="https://github.com/CAL737" target="_blank">[ GitHub ]</a>
        </nav>
        <div class="page-title">SYSTEM_LOG_HISTORY</div>
        <div class="timeline">
            <div class="log-item">
                <div class="log-date">// 2026-07-15 20:00:00</div>

        </div>
        <a href="/" class="cyber-btn">[ cd ~ ] 返回首页</a>
