<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAL737_BLOG | Home</title>
    <style>
        /* --- 全局变量与基础样式 --- */
        :root {
            --bg-color: #050505; --card-bg: rgba(20,20,25,0.8); --text-main: #e0e0e0; 
            --text-dim: #8892b0; --accent: #00f3ff; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg-color: #f4f4f5; --card-bg: #ffffff; --text-main: #1f2937; 
            --text-dim: #6b7280; --accent: #2563eb; --border: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Courier New', monospace; line-height: 1.6; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }

        /* --- 顶部导航与主题切换 --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--accent); text-decoration: none; }
        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem;}
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        /* --- 标签筛选器 --- */
        .tags-filter { margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.3s;}
        .tag-btn.active, .tag-btn:hover { background: var(--accent); color: var(--bg-color); border-color: var(--accent); }

        /* --- 文章卡片 --- */
        .post-item { border-left: 2px solid var(--border); padding-left: 20px; margin-bottom: 30px; transition: 0.3s; }
        .post-item:hover { border-left-color: var(--accent); transform: translateX(5px); }
        .date { color: var(--text-dim); font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .title { font-size: 1.2rem; color: var(--text-main); text-decoration: none; font-weight: bold; display: block; margin-bottom: 8px;}
        .title:hover { color: var(--accent); }
        .summary { color: var(--text-dim); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">> CAL737_BLOG_</a>
            <button class="theme-toggle" id="themeBtn">[ Toggle Light ]</button>
        </header>

        <!-- 标签过滤区 -->
        <div class="tags-filter" id="tagsFilter">
            <!-- JS 会自动生成标签按钮 -->
        </div>

        <!-- 文章列表 -->
        <main id="post-container">
            <p style="color: var(--text-dim);">> System initializing...</p>
        </main>
    </div>

    <script src="posts.js"></script>
    <script>
        // 1. 主题切换逻辑
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeBtn.textContent = isLight ? '[ Toggle Light ]' : '[ Toggle Dark ]';
        });

        // 2. 渲染文章与标签逻辑
        const container = document.getElementById('post-container');
        const tagsFilter = document.getElementById('tagsFilter');
        let currentTag = 'All';

        function render() {
            // 提取所有不重复的标签
            const allTags = ['All', ...new Set(blogPosts.flatMap(p => p.tags || []))];
            
            // 渲染标签按钮
            tagsFilter.innerHTML = allTags.map(tag => 
                `<button class="tag-btn ${tag === currentTag ? 'active' : ''}" data-tag="${tag}">#${tag}</button>`
            ).join('');

            // 绑定标签点击事件
            tagsFilter.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTag = btn.dataset.tag;
                    render(); // 重新渲染
                });
            });

            // 过滤并渲染文章
            const filtered = currentTag === 'All' ? blogPosts : blogPosts.filter(p => p.tags && p.tags.includes(currentTag));
            
            container.innerHTML = filtered.length > 0 ? filtered.map(post => `
                <article class="post-item">
                    <span class="date">// ${post.date}</span>
                    <a href="${post.link}" class="title">${post.title}</a>
                    <p class="summary">${post.summary}</p>
                </article>
            `).join('') : '<p>> No matching logs found.</p>';
        }

        // 初始化
        if (typeof blogPosts !== 'undefined') render();
    </script>
</body>
</html>
