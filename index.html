<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAL737_BLOG | Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 主页专属样式 */
        header { padding: 80px 0 50px; text-align: center; }
        .glitch-title {
            font-size: 3rem; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .typewriter { font-size: 1.1rem; color: var(--neon-blue); border-right: 2px solid var(--neon-blue); padding-right: 5px; }
        .post-list { list-style: none; display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px; }
        .post-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 30px; backdrop-filter: blur(10px);
            transition: all 0.4s; opacity: 0; transform: translateY(30px);
        }
        .post-card.visible { opacity: 1; transform: translateY(0); }
        .post-card:hover { border-color: rgba(0, 243, 255, 0.3); box-shadow: 0 10px 40px -10px rgba(0, 243, 255, 0.15); transform: translateY(-5px) !important; }
        .post-card h2 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
        .post-card h2 a { text-decoration: none; color: inherit; transition: all 0.3s; }
        .post-card h2 a:hover { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,243,255,0.4); }
        .post-meta { font-size: 0.8rem; color: var(--neon-purple); margin-bottom: 12px; font-weight: bold; letter-spacing: 1px; }
        .post-excerpt { color: var(--text-dim); font-size: 0.95rem; }
        footer { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--card-border); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <header>
            <h1 class="glitch-title">CAL737_BLOG</h1>
            <div class="typewriter" id="typewriter"></div>
        </header>
        <nav>
            <a href="/">[ Home ]</a>
            <a href="/archives.html">[ Archives ]</a>
            <a href="/about.html">[ About ]</a>
            <a href="https://github.com/CAL737" target="_blank">[ 我的GitHub ]</a>
        </nav>
        <main>
            <ul class="post-list">
                <li class="post-card">
                    <div class="post-meta">// 2026-07-15 · SYSTEM_INIT</div>
                    <h2><a href="#">Hello World: 系统初始化完成</a></h2>
                    <p class="post-excerpt">个人博客节点已成功部署。这里将作为我的数字花园，记录代码、技术探索与赛博空间中的碎片思考...</p>
                </li>
            </ul>
        </main>
        <footer>&copy; 2026 CAL737 | Powered by Pure HTML/CSS & Neon Dreams</footer>
    </div>
    <script>
        const text = "> Welcome to my digital space. Loading thoughts..._";
        const el = document.getElementById('typewriter');
        let i = 0;
        function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 80); } }
        type();
        const obs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold: 0.1});
        document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
    </script>
</body>
</html>
